<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神州风物 · 中国旅游导览</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════════
           CSS Variables — 翠微青山 palette
           ═══════════════════════════════════════════════════ */
        :root {
            --bg: #eef3ea;
            --bg-deep: #dce6d4;
            --bg-card: rgba(255, 255, 255, 0.88);
            --green: #4a9e5a;
            --green-bright: #6cc47a;
            --green-dark: #2d6e3c;
            --green-glow: rgba(74, 158, 90, 0.25);
            --green-pale: #c8dfc8;
            --earth: #8a7a5a;
            --sky: #c0d8e8;
            --text-primary: #2a3a2a;
            --text-secondary: #5a7a5a;
            --text-muted: #8a9a7a;
            --text-light: #b0c0a8;
            --panel-bg: rgba(255, 255, 255, 0.88);
            --panel-border: rgba(74, 158, 90, 0.15);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --font-display: 'Playfair Display', 'Noto Serif SC', serif;
            --font-body: 'DM Sans', 'Noto Serif SC', 'PingFang SC', sans-serif;
            --font-ui: 'DM Sans', 'PingFang SC', sans-serif;
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ═══════════════════════════════════════════════════
           Reset & Base
           ═══════════════════════════════════════════════════ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font-body);
            color: var(--text-primary);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: none;
        }

        /* ─── Custom Cursor ───────────────────────────── */
        #cursor-ring {
            position: fixed;
            width: 32px;
            height: 32px;
            border: 1.5px solid var(--green);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s, background 0.3s;
        }
        #cursor-ring.hover {
            width: 48px;
            height: 48px;
            border-color: var(--green-bright);
            background: rgba(74, 158, 90, 0.06);
        }
        #cursor-dot {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--green-bright);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.15s, height 0.15s;
        }
        #cursor-dot.hover {
            width: 6px;
            height: 6px;
        }
        @media (hover: none) and (pointer: coarse) {
            #cursor-ring, #cursor-dot { display: none; }
            body { cursor: auto; }
        }

        /* ─── Canvas ──────────────────────────────────── */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════════════
           Loading Screen — fresh spring animation
           ═══════════════════════════════════════════════════ */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            transition: opacity 1.2s ease, visibility 1.2s ease;
        }
        #loading.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-symbol {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 40px;
        }
        .loading-symbol .outer-ring {
            position: absolute;
            inset: 0;
            border: 1px solid var(--green-dark);
            border-radius: 50%;
            animation: load-ring 3s ease-in-out infinite;
        }
        .loading-symbol .inner-ring {
            position: absolute;
            inset: 12px;
            border: 1px solid var(--green);
            border-radius: 50%;
            animation: load-ring 3s ease-in-out infinite reverse;
        }
        .loading-symbol .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            background: var(--green-bright);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--green-glow);
        }
        @keyframes load-ring {
            0% { transform: rotate(0deg) scale(0.8); opacity: 0.3; }
            50% { transform: rotate(180deg) scale(1); opacity: 1; }
            100% { transform: rotate(360deg) scale(0.8); opacity: 0.3; }
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 14px;
            letter-spacing: 6px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .loading-text span {
            display: inline-block;
            animation: load-char 1.8s ease-in-out infinite;
        }
        .loading-text span:nth-child(1) { animation-delay: 0s; }
        .loading-text span:nth-child(2) { animation-delay: 0.15s; }
        .loading-text span:nth-child(3) { animation-delay: 0.3s; }
        .loading-text span:nth-child(4) { animation-delay: 0.45s; }
        @keyframes load-char {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }
        .loading-progress {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 2px;
            background: rgba(74, 158, 90, 0.12);
            overflow: hidden;
            border-radius: 1px;
        }
        .loading-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--green-dark), var(--green), var(--green-bright));
            transition: width 0.5s ease;
        }

        /* ═══════════════════════════════════════════════════
           Header — minimal, floating, fresh
           ═══════════════════════════════════════════════════ */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(238, 243, 234, 0.7) 0%, transparent 100%);
        }
        .header-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .header-brand {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            color: var(--green-dark);
            letter-spacing: 3px;
        }
        .header-brand small {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-left: 6px;
        }
        .header-sub {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-weight: 300;
        }
        @media (max-width: 640px) {
            .header { padding: 14px 16px; }
            .header-brand { font-size: 15px; }
            .header-sub { display: none; }
        }

        /* ═══════════════════════════════════════════════════
           Sidebar — fresh paper aesthetic
           ═══════════════════════════════════════════════════ */
        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 340px;
            height: 100vh;
            z-index: 15;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), box-shadow var(--transition);
            box-shadow: -20px 0 60px rgba(74, 158, 90, 0.06);
        }
        #sidebar.collapsed {
            transform: translateX(340px);
            box-shadow: none;
        }

        /* Decorative top border */
        #sidebar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), var(--green-bright), var(--green), transparent);
            opacity: 0.5;
        }

        .sidebar-header {
            padding: 16px 20px 10px;
            flex-shrink: 0;
        }
        .sidebar-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .sidebar-title {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            color: var(--green-dark);
            letter-spacing: 2px;
        }
        .sidebar-title-icon {
            margin-right: 8px;
            font-size: 14px;
        }

        .sidebar-close-btn {
            width: 30px; height: 30px;
            border: 1px solid var(--panel-border);
            background: transparent;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 14px;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            pointer-events: auto;
        }
        .sidebar-close-btn:hover {
            border-color: var(--green);
            color: var(--green);
            background: rgba(74, 158, 90, 0.04);
        }

        .sidebar-search {
            position: relative;
        }
        .sidebar-search input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            background: rgba(74, 158, 90, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-ui);
            outline: none;
            transition: border-color 0.25s, background 0.25s;
            cursor: none;
        }
        .sidebar-search input::placeholder { color: var(--text-light); }
        .sidebar-search input:focus {
            border-color: rgba(74, 158, 90, 0.3);
            background: rgba(74, 158, 90, 0.05);
        }
        .sidebar-search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 12px;
            opacity: 0.5;
            pointer-events: none;
        }

        .sidebar-divider {
            height: 1px;
            margin: 0 20px;
            background: linear-gradient(90deg, transparent, var(--panel-border), transparent);
            flex-shrink: 0;
        }

        /* Tree scroll area */
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(74, 158, 90, 0.15) transparent;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 3px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(74, 158, 90, 0.2); border-radius: 2px; }

        /* ─── Tree Items ──────────────────────────────── */
        .tree-item-header {
            display: flex;
            align-items: center;
            padding: 8px 16px 8px 20px;
            cursor: none;
            transition: background 0.25s ease;
            gap: 6px;
            position: relative;
            pointer-events: auto;
        }
        .tree-item-header:hover {
            background: rgba(74, 158, 90, 0.04);
        }
        .tree-item-header.active {
            background: rgba(74, 158, 90, 0.08);
        }
        .tree-item-header.active .tree-label {
            color: var(--green);
        }
        .tree-item-header.active::after {
            content: '';
            position: absolute;
            right: 0;
            top: 3px;
            bottom: 3px;
            width: 2px;
            background: var(--green);
            border-radius: 1px 0 0 1px;
            box-shadow: -2px 0 12px rgba(74, 158, 90, 0.3);
        }

        .tree-toggle {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: transform 0.3s ease, color 0.3s ease;
        }
        .tree-toggle.expanded {
            transform: rotate(90deg);
            color: var(--green);
        }

        .tree-label {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        .province-type-badge {
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(74, 158, 90, 0.06);
            color: var(--green-dark);
            border: 1px solid var(--panel-border);
            flex-shrink: 0;
            letter-spacing: 0.5px;
            font-family: var(--font-ui);
        }

        .tree-item.province > .tree-item-header {
            padding-left: 16px;
        }
        .tree-item.province > .tree-item-header .tree-label {
            font-weight: 500;
            font-size: 14px;
        }

        .tree-children {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease;
        }
        .tree-children.expanded {
            max-height: 2000px;
        }

        .city-header {
            padding-left: 52px !important;
        }
        .city-header .tree-label {
            font-size: 12px;
            font-weight: 300;
            color: var(--text-muted);
        }
        .city-header:hover .tree-label {
            color: var(--text-secondary);
        }
        .city-header.active .tree-label {
            color: var(--green);
        }

        .data-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(74, 158, 90, 0.12);
            flex-shrink: 0;
        }
        .data-dot.active {
            background: var(--green);
            box-shadow: 0 0 8px rgba(74, 158, 90, 0.3);
        }

        .sidebar-no-result {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            opacity: 0.6;
        }

        /* ─── Sidebar Toggle ──────────────────────────── */
        #sidebarToggle {
            position: fixed;
            top: 18px;
            right: 16px;
            z-index: 20;
            width: 36px;
            height: 36px;
            border: 1px solid var(--panel-border);
            background: rgba(238, 243, 234, 0.85);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: none;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            padding: 0;
            pointer-events: auto;
        }
        #sidebarToggle:hover {
            border-color: var(--green);
            color: var(--green);
        }
        #sidebarToggle svg {
            width: 18px;
            height: 18px;
        }

        /* ─── Overlay ─────────────────────────────────── */
        #sidebarOverlay {
            position: fixed;
            inset: 0;
            z-index: 14;
            background: rgba(42, 58, 42, 0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #sidebarOverlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ═══════════════════════════════════════════════════
           Region Detail Card — fresh paper
           ═══════════════════════════════════════════════════ */
        #regionCard {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            z-index: 12;
            width: min(520px, calc(100vw - 32px));
            max-height: min(420px, 45vh);
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--panel-border);
            border-bottom: none;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 0;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 -12px 40px rgba(74, 158, 90, 0.06);
            overflow: hidden;
        }
        #regionCard.visible {
            transform: translate(-50%, 0);
        }

        /* Decorative top bar on card */
        #regionCard::before {
            content: '';
            position: absolute;
            top: 0; left: 40px; right: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            opacity: 0.4;
        }

        .region-card-inner {
            padding: 24px 24px 20px;
            overflow-y: auto;
            max-height: inherit;
            scrollbar-width: thin;
            scrollbar-color: rgba(74, 158, 90, 0.1) transparent;
        }
        .region-card-inner::-webkit-scrollbar { width: 3px; }
        .region-card-inner::-webkit-scrollbar-thumb { background: rgba(74, 158, 90, 0.15); border-radius: 2px; }

        .region-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .region-card-name-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .region-card-emoji {
            font-size: 28px;
            line-height: 1;
        }
        .region-card-name {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .region-card-badge {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .region-card-close {
            width: 26px; height: 26px;
            border: 1px solid var(--panel-border);
            background: transparent;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 12px;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
            pointer-events: auto;
        }
        .region-card-close:hover {
            border-color: var(--green);
            color: var(--green);
        }

        .region-card-desc {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 14px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .region-card-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .region-card-section h4 {
            font-family: var(--font-display);
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--green-dark);
            font-weight: 600;
            margin-bottom: 6px;
        }
        .region-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .region-card-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: rgba(74, 158, 90, 0.05);
            border: 1px solid var(--panel-border);
            border-radius: 3px;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.3px;
            font-family: var(--font-body);
        }

        @media (max-width: 480px) {
            #regionCard { width: calc(100vw - 16px); }
            .region-card-inner { padding: 18px 16px 16px; }
            .region-card-name { font-size: 18px; }
            .region-card-sections { grid-template-columns: 1fr; }
        }

        /* ═══════════════════════════════════════════════════
           Hint text
           ═══════════════════════════════════════════════════ */
        .hint {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 12px;
            color: var(--text-light);
            letter-spacing: 2px;
            font-weight: 300;
            font-family: var(--font-ui);
            pointer-events: none;
            white-space: nowrap;
            animation: hint-pulse 4s ease-in-out infinite;
        }
        @keyframes hint-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        @media (max-width: 640px) {
            .hint { font-size: 10px; bottom: 18px; }
        }

        /* ═══════════════════════════════════════════════════
           Marker Legend
           ═══════════════════════════════════════════════════ */
        .legend {
            position: fixed;
            bottom: 60px;
            left: 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 4px;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.4s;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-family: var(--font-ui);
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green-bright);
            box-shadow: 0 0 6px rgba(108, 196, 122, 0.5);
        }
        @media (max-width: 640px) {
            .legend { display: none; }
        }

        /* ═══════════════════════════════════════════════════
           Responsive
           ═══════════════════════════════════════════════════ */
        @media (min-width: 769px) {
            #sidebar:not(.collapsed) { transform: translateX(0); }
            #sidebar.collapsed ~ #sidebarToggle { display: flex; }
            #sidebar:not(.collapsed) ~ #sidebarToggle { display: none; }
            #sidebarOverlay { display: none; }
        }
        @media (max-width: 768px) {
            #sidebar {
                width: 300px;
                max-width: 80vw;
                transform: translateX(100%);
            }
            #sidebar.mobile-open { transform: translateX(0); }
            #sidebarToggle { display: flex; }
            #sidebar.collapsed ~ #sidebarToggle,
            #sidebar.mobile-open ~ #sidebarToggle { display: none; }
        }

        /* ─── Floating leaves particles (decorative) ──── */
        .leaf-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--green-pale);
            border-radius: 50% 0 50% 0;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: leaf-float linear infinite;
        }
        @keyframes leaf-float {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- ═══════════════════════════════════════════════════
         Custom Cursor
         ═══════════════════════════════════════════════════ -->
    <div id="cursor-ring"></div>
    <div id="cursor-dot"></div>

    <!-- ═══════════════════════════════════════════════════
         Three.js via importmap
         ═══════════════════════════════════════════════════ -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ──────────────────────────────────────────────────────
       Custom Cursor
       ────────────────────────────────────────────────────── */
    const ring = document.getElementById('cursor-ring');
    const dot = document.getElementById('cursor-dot');

    let mouseX = -200, mouseY = -200;
    let ringX = -200, ringY = -200;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = mouseX + 'px';
        dot.style.top = mouseY + 'px';
    });

    function animateCursor() {
        ringX += (mouseX - ringX) * 0.12;
        ringY += (mouseY - ringY) * 0.12;
        ring.style.left = ringX + 'px';
        ring.style.top = ringY + 'px';
        requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hover effect on clickable elements
    document.querySelectorAll('a, button, input, .tree-item-header, .region-card-close, #sidebarToggle').forEach(el => {
        el.addEventListener('mouseenter', () => { ring.classList.add('hover'); dot.classList.add('hover'); });
        el.addEventListener('mouseleave', () => { ring.classList.remove('hover'); dot.classList.remove('hover'); });
    });

    // Also apply to dynamically created tree items
    const sidebarScroll = document.getElementById('sidebarScroll');
    const observer = new MutationObserver(() => {
        document.querySelectorAll('.tree-item-header').forEach(el => {
            if (!el.dataset.cursorBound) {
                el.dataset.cursorBound = '1';
                el.addEventListener('mouseenter', () => { ring.classList.add('hover'); dot.classList.add('hover'); });
                el.addEventListener('mouseleave', () => { ring.classList.remove('hover'); dot.classList.remove('hover'); });
            }
        });
    });
    observer.observe(sidebarScroll, { childList: true, subtree: true });

    /* ──────────────────────────────────────────────────────
       Loading bar simulation
       ────────────────────────────────────────────────────── */
    const loadingBar = document.getElementById('loadingBar');
    let loadingProgress = 0;
    const loadInterval = setInterval(() => {
        loadingProgress += Math.random() * 15 + 5;
        if (loadingProgress > 95) loadingProgress = 95;
        loadingBar.style.width = loadingProgress + '%';
    }, 400);

    /* ──────────────────────────────────────────────────────
       Three.js Scene Setup
       ────────────────────────────────────────────────────── */
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    // 清新天空背景色
    scene.background = new THREE.Color(0xeaf3ec);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0.3, 0.4, 2.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.4;
    controls.autoRotate = false;
    controls.minDistance = 1.8;
    controls.maxDistance = 6;
    controls.target.set(0, 0, 0);

    /* ──────────────────────────────────────────────────────
       Earth
       ────────────────────────────────────────────────────── */
    const EARTH_RADIUS = 1;
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // 高细分球体以支持位移贴图（展现凹凸地形）
    const SUBDIV = 96;
    const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, SUBDIV, SUBDIV);
    const textureLoader = new THREE.TextureLoader();
    let texturesLoaded = 0;
    const TOTAL_TEXTURES = 3;

    const earthMat = new THREE.MeshStandardMaterial({
        roughness: 0.6,
        metalness: 0.0,
        color: 0x1a3a2a,
    });

    const earth = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earth);

    function onTextureProgress() {
        texturesLoaded++;
        if (texturesLoaded >= TOTAL_TEXTURES) {
            earthMat.needsUpdate = true;
        }
    }

    // 加载地球表面色彩图
    const texUrl = 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';
    textureLoader.load(texUrl, (tex) => {
        earthMat.map = tex;
        earthMat.color.set(0xffffff);
        onTextureProgress();
    }, undefined, () => {
        textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
            earthMat.map = tex;
            earthMat.color.set(0xffffff);
            onTextureProgress();
        });
    });

    // ─── 位移贴图（Displacement Map）—— 真正3D地形起伏，中国地质风貌突出 ──
    textureLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png', (tex) => {
        // 位移贴图：把地形灰度图映射到球体顶点，亮色隆起、暗色凹陷
        earthMat.displacementMap = tex;
        earthMat.displacementScale = 0.055;  // 加大位移量，中国青藏高原、横断山脉显著隆起
        earthMat.displacementBias = -0.012;  // 让海洋适度下凹
        onTextureProgress();

        // 凹凸贴图：增强表面细节感
        earthMat.bumpMap = tex;
        earthMat.bumpScale = 0.28;  // 大幅增强凹凸感
    }, undefined, () => {
        textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg', (tex) => {
            earthMat.normalMap = tex;
            earthMat.normalScale = new THREE.Vector2(1.2, 1.2);
            onTextureProgress();
        });
    });

    // ─── 法线贴图（Normal Map）—— 表面微细节 ─────────────────
    textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg', (tex) => {
        earthMat.normalMap = tex;
        earthMat.normalScale = new THREE.Vector2(0.6, 0.6);
        onTextureProgress();
    }, undefined, () => {
        // 若法线贴图加载失败不影响
        texturesLoaded++;
        if (texturesLoaded >= TOTAL_TEXTURES) earthMat.needsUpdate = true;
    });

    // 地形加载完毕后适当地调整scale（如果全部图片都加载成功）
    // 用setTimeout兜底，防止部分图片加载慢导致渲染状态不一致
    setTimeout(() => {
        earthMat.needsUpdate = true;
    }, 5000);

    /* ──────────────────────────────────────────────────────
       Atmosphere — fresh spring green glow
       ────────────────────────────────────────────────────── */
    const atmosMat = new THREE.ShaderMaterial({
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vec3 viewDir = normalize(-vPosition);
                float rim = 1.0 - max(0.0, dot(viewDir, vNormal));
                float intensity = pow(rim, 3.0) * 0.5;
                // Fresh spring green atmosphere
                vec3 green = vec3(0.45, 0.78, 0.50);
                gl_FragColor = vec4(green, intensity * 0.5);
            }
        `,
        transparent: true,
        side: THREE.FrontSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });
    const atmosMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.025, 48, 48), atmosMat);
    earthGroup.add(atmosMesh);

    // Secondary outer glow — soft white-green
    const glowMat = new THREE.ShaderMaterial({
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vec3 viewDir = normalize(-vPosition);
                float rim = 1.0 - max(0.0, dot(viewDir, vNormal));
                float intensity = pow(rim, 4.0) * 0.25;
                gl_FragColor = vec4(0.5, 0.9, 0.55, intensity);
            }
        `,
        transparent: true,
        side: THREE.FrontSide,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });
    const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.06, 32, 32), glowMat);
    earthGroup.add(glowMesh);

    /* ──────────────────────────────────────────────────────
       Floating particles — soft natural specks
       ────────────────────────────────────────────────────── */
    function createParticleField(count, spread, size, color, opacity) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            const r = spread * 0.3 + Math.random() * spread * 0.7;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            pos[i * 3 + 1] = r * Math.cos(phi);
            pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        return new THREE.Points(geo, new THREE.PointsMaterial({
            color, size, transparent: true, opacity,
            sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false,
        }));
    }

    // Soft floating particles (white/silver for daylight feel)
    scene.add(createParticleField(500, 200, 0.08, 0xccddcc, 0.15));
    scene.add(createParticleField(300, 120, 0.1, 0xddeedd, 0.1));

    /* ──────────────────────────────────────────────────────
       Subtle connecting lines
       ────────────────────────────────────────────────────── */
    function createConnectingLines() {
        const group = new THREE.Group();
        const lineMat = new THREE.LineBasicMaterial({
            color: 0xaaccaa,
            transparent: true,
            opacity: 0.02,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });

        for (let c = 0; c < 8; c++) {
            const pointCount = 3 + Math.floor(Math.random() * 3);
            const pts = [];
            for (let i = 0; i < pointCount; i++) {
                const r = 6 + Math.random() * 15;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pts.push(new THREE.Vector3(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                ));
            }
            for (let i = 0; i < pts.length - 1; i++) {
                const geo = new THREE.BufferGeometry().setFromPoints([pts[i], pts[i + 1]]);
                const line = new THREE.Line(geo, lineMat);
                group.add(line);
            }
        }
        return group;
    }
    scene.add(createConnectingLines());

    /* ──────────────────────────────────────────────────────
       Floating leaf particles (CSS-based, spring feel)
       ────────────────────────────────────────────────────── */
    (function createLeafParticles() {
        for (let i = 0; i < 15; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf-particle';
            leaf.style.left = Math.random() * 100 + '%';
            const sz = 5 + Math.random() * 10;
            leaf.style.width = sz + 'px';
            leaf.style.height = sz + 'px';
            leaf.style.animationDuration = (18 + Math.random() * 35) + 's';
            leaf.style.animationDelay = (Math.random() * 25) + 's';
            document.body.appendChild(leaf);
        }
    })();

    /* ──────────────────────────────────────────────────────
       Lights — 自然日光，突出中国地形起伏
       ────────────────────────────────────────────────────── */
    // 环境光——柔和的天空光
    scene.add(new THREE.AmbientLight(0xbbd8bb, 0.55));

    // 主光源——模拟太阳光，从东南方照亮（中国位于北半球）
    const sunLight = new THREE.DirectionalLight(0xfffff0, 1.4);
    sunLight.position.set(6, 8, 4);
    scene.add(sunLight);

    // 背光补光——勾出山脊轮廓
    const fillLight = new THREE.DirectionalLight(0x88ddbb, 0.6);
    fillLight.position.set(-5, -2, -5);
    scene.add(fillLight);

    // 侧面暖光
    const keyLight = new THREE.DirectionalLight(0xffeebb, 0.5);
    keyLight.position.set(-3, 5, 4);
    scene.add(keyLight);

    // 底光——照亮地形凹陷
    const bottomLight = new THREE.DirectionalLight(0x88ccaa, 0.2);
    bottomLight.position.set(0, -6, 0);
    scene.add(bottomLight);

    /* ──────────────────────────────────────────────────────
       Coordinate Helpers
       ────────────────────────────────────────────────────── */
    function latLngToVec3(lat, lng, radius) {
        const phi = (90 - lat) * Math.PI / 180;
        const theta = (lng + 180) * Math.PI / 180;
        return new THREE.Vector3(
            -radius * Math.sin(phi) * Math.cos(theta),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    /* ──────────────────────────────────────────────────────
       Province Borders — green
       ────────────────────────────────────────────────────── */
    const borderGroup = new THREE.Group();
    earthGroup.add(borderGroup);
    const borderMaterials = [];
    const borderMaterialMap = {};
    let selectedBorderMaterials = null;

    async function loadProvinceBorders() {
        try {
            const res = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
            const geo = await res.json();
            const R = EARTH_RADIUS * 1.003;

            for (const feature of geo.features) {
                const provName = feature.properties.name;
                const coords = feature.geometry.coordinates;
                const polygons = feature.geometry.type === 'MultiPolygon' ? coords : [coords];
                const mats = [];

                for (const polygon of polygons) {
                    const ring = polygon[0];
                    if (!ring || ring.length < 3) continue;

                    const pts = ring.map(([lng, lat]) => latLngToVec3(lat, lng, R));
                    pts.push(pts[0].clone());

                    const mat = new THREE.LineBasicMaterial({
                        color: 0x5a9a5a,
                        transparent: true,
                        opacity: 0.15,
                        depthWrite: false,
                    });
                    borderGroup.add(new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints(pts), mat
                    ));
                    borderMaterials.push(mat);
                    mats.push(mat);
                }
                borderMaterialMap[provName] = mats;
            }
        } catch (err) {
            console.warn('⚠️ 省界加载失败:', err);
        }
    }

    function highlightProvinceBorders(provinceName) {
        for (const mat of borderMaterials) {
            mat.opacity = 0.04;
            mat.color.setHex(0x5a9a5a);
        }
        if (provinceName && borderMaterialMap[provinceName]) {
            selectedBorderMaterials = borderMaterialMap[provinceName];
        } else {
            selectedBorderMaterials = null;
        }
    }

    function findProvinceName(data) {
        if (!data) return null;
        if (data.level === 'province') return data.name;
        for (const prov of allRegions) {
            if (prov.children && prov.children.some(c => c.id === data.id || c.name === data.name)) {
                return prov.name;
            }
        }
        return null;
    }

    /* ──────────────────────────────────────────────────────
       China National Border — lush green
       ────────────────────────────────────────────────────── */
    const chinaBorderGroup = new THREE.Group();
    earthGroup.add(chinaBorderGroup);

    async function loadChinaBorder() {
        try {
            const res = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000.json');
            const geo = await res.json();
            const feature = geo.features[0];
            if (!feature) throw new Error('empty GeoJSON');
            const coords = feature.geometry.coordinates;
            const polygons = feature.geometry.type === 'MultiPolygon' ? coords : [coords];

            for (const polygon of polygons) {
                const ring = polygon[0];
                if (!ring || ring.length < 3) continue;

                const layers = [
                    { radius: 1.008, color: 0x4a8a4a, opacity: 0.15 },
                    { radius: 1.005, color: 0x4a9a4a, opacity: 0.35 },
                    { radius: 1.003, color: 0x6cb47a, opacity: 0.7 },
                ];
                for (const layer of layers) {
                    const pts = ring.map(([lng, lat]) => latLngToVec3(lat, lng, layer.radius));
                    pts.push(pts[0].clone());
                    chinaBorderGroup.add(new THREE.Line(
                        new THREE.BufferGeometry().setFromPoints(pts),
                        new THREE.LineBasicMaterial({
                            color: layer.color,
                            transparent: true,
                            opacity: layer.opacity,
                            depthWrite: false,
                        })
                    ));
                }
            }
        } catch (err) {
            console.warn('⚠️ 国界线加载失败:', err);
        }
    }

    /* ──────────────────────────────────────────────────────
       Scenic Spot Markers — glowing dots on tourist hotspots
       ────────────────────────────────────────────────────── */
    const scenicMarkerGroup = new THREE.Group();
    earthGroup.add(scenicMarkerGroup);
    const scenicMarkers = [];

    // Major tourist destinations across China (lat, lng, name)
    const scenicSpots = [
        // ── 首都/直辖市 ──
        [39.90, 116.40, '北京'],
        [31.23, 121.47, '上海'],
        [39.13, 117.19, '天津'],
        [29.56, 106.55, '重庆'],
        // ── 东北 ──
        [41.84, 123.43, '沈阳'],
        [38.91, 121.62, '大连'],
        [43.90, 125.32, '长春'],
        [45.74, 126.66, '哈尔滨'],
        [44.59, 129.59, '牡丹江'],
        // ── 华北 ──
        [38.05, 114.50, '石家庄'],
        [37.87, 112.56, '太原'],
        [40.08, 113.30, '大同'],
        [40.82, 111.75, '呼和浩特'],
        [49.20, 119.75, '呼伦贝尔'],
        // ── 华东 ──
        [36.67, 116.99, '济南'],
        [36.07, 120.38, '青岛'],
        [35.58, 116.99, '曲阜'],
        [32.06, 118.80, '南京'],
        [31.30, 120.58, '苏州'],
        [30.27, 120.15, '杭州'],
        [29.87, 121.55, '宁波'],
        [31.82, 117.23, '合肥'],
        [29.72, 118.34, '黄山'],
        [26.07, 119.30, '福州'],
        [24.48, 118.09, '厦门'],
        [28.67, 115.89, '南昌'],
        [29.66, 116.00, '九江'],
        [34.75, 113.62, '郑州'],
        [34.62, 112.45, '洛阳'],
        [34.80, 114.35, '开封'],
        // ── 华中 ──
        [30.59, 114.31, '武汉'],
        [28.23, 112.94, '长沙'],
        [29.12, 110.48, '张家界'],
        // ── 华南 ──
        [23.13, 113.27, '广州'],
        [22.54, 114.06, '深圳'],
        [22.27, 113.57, '珠海'],
        [22.82, 108.37, '南宁'],
        [25.28, 110.29, '桂林'],
        [20.02, 110.35, '海口'],

        [22.20, 113.54, '澳门'],

    function createScenicMarker(lat, lng, name) {
        const pos = latLngToVec3(lat, lng, EARTH_RADIUS * 1.005);
        const group = new THREE.Group();
        group.position.copy(pos);

        // Glowing dot - fresh green
        const dotGeo = new THREE.SphereGeometry(0.008, 8, 8);
        const dotMat = new THREE.MeshBasicMaterial({
            color: 0x5cbf6c,
            transparent: true,
            opacity: 0.9,
        });
        const dot = new THREE.Mesh(dotGeo, dotMat);
        group.add(dot);

        // Outer glow ring
        const ringGeo = new THREE.RingGeometry(0.012, 0.018, 16);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x4aae5a,
            transparent: true,
            opacity: 0.3,
            side: THREE.DoubleSide,
            depthWrite: false,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.lookAt(0, 0, 0);
        group.add(ring);

        // Store for animation
        scenicMarkers.push({ group, ring, dot, baseOpacity: 0.3 });

        return group;
    }

    // Create all scenic markers
    const markerColors = [0x5cbf6c, 0x60d070, 0x50c0e8, 0x80d050, 0xa0e0a0];
    for (let i = 0; i < scenicSpots.length; i++) {
        const [lat, lng] = scenicSpots[i];
        const marker = createScenicMarker(lat, lng, scenicSpots[i][2]);
        scenicMarkerGroup.add(marker);
    }

    /* ──────────────────────────────────────────────────────
       Fly-To Animation
       ────────────────────────────────────────────────────── */
    let flyState = null;

    function flyTo(lat, lng, duration = 1200, targetDist = 2.5, callback = null) {
        if (flyState) flyState = null;
        const endTarget = latLngToVec3(lat, lng, 1);
        const dist = Math.max(targetDist, 1.8);
        const endCamPos = endTarget.clone().normalize().multiplyScalar(dist);

        flyState = {
            startTime: performance.now(),
            duration,
            startCamPos: camera.position.clone(),
            endCamPos,
            callback,
        };
        controls.enableDamping = false;
        controls.enableRotate = false;
        controls.autoRotate = false;
    }

    /* ──────────────────────────────────────────────────────
       Region Detail Card
       ────────────────────────────────────────────────────── */
    const regionCard = document.getElementById('regionCard');
    const regionCardInner = document.getElementById('regionCardInner');
    let currentRegionData = null;

    function showRegionCard(data) {
        if (!data || (!data.description && !data.attractions && !data.food)) {
            regionCard.classList.remove('visible');
            currentRegionData = null;
            return;
        }

        currentRegionData = data;
        const emoji = data.emoji || '📍';
        const badge = data.badge || '';
        const desc = data.description || '';
        const attractions = data.attractions || [];
        const food = data.food || [];

        let html = `
            <div class="region-card-header">
                <div>
                    <div class="region-card-name-row">
                        <span class="region-card-emoji">${emoji}</span>
                        <span class="region-card-name">${data.name}</span>
                    </div>
                    ${badge ? `<div class="region-card-badge">${badge}</div>` : ''}
                </div>
                <button class="region-card-close" id="regionCardClose" aria-label="关闭">✕</button>
            </div>
            ${desc ? `<div class="region-card-desc">${desc}</div>` : ''}
        `;

        if (attractions.length > 0 || food.length > 0) {
            html += '<div class="region-card-sections">';
            if (attractions.length > 0) {
                html += `<div class="region-card-section">
                    <h4>✦ 名胜</h4>
                    <div class="region-card-tags">
                        ${attractions.map(a => `<span class="region-card-tag">${a}</span>`).join('')}
                    </div>
                </div>`;
            }
            if (food.length > 0) {
                html += `<div class="region-card-section">
                    <h4>✦ 风物</h4>
                    <div class="region-card-tags">
                        ${food.map(f => `<span class="region-card-tag">${f}</span>`).join('')}
                    </div>
                </div>`;
            }
            html += '</div>';
        }

        regionCardInner.innerHTML = html;

        // Bind close button
        const closeBtn = document.getElementById('regionCardClose');
        if (closeBtn) {
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                regionCard.classList.remove('visible');
                currentRegionData = null;
            });
            closeBtn.addEventListener('mouseenter', () => { ring.classList.add('hover'); dot.classList.add('hover'); });
            closeBtn.addEventListener('mouseleave', () => { ring.classList.remove('hover'); dot.classList.remove('hover'); });
        }

        regionCard.classList.add('visible');
    }

    /* ──────────────────────────────────────────────────────
       Sidebar
       ────────────────────────────────────────────────────── */
    let allRegions = [];

    function buildSidebar(regions, filter = '') {
        const container = document.getElementById('sidebarScroll');
        container.innerHTML = '';

        const q = filter.trim().toLowerCase();
        let hasResult = false;

        for (const prov of regions) {
            if (q && !prov.name.includes(q) && !(prov.children || []).some(c => c.name.includes(q))) continue;
            hasResult = true;

            const div = document.createElement('div');
            div.className = 'tree-item province';

            const header = document.createElement('div');
            header.className = 'tree-item-header province-header';
            header.dataset.lat = prov.lat;
            header.dataset.lng = prov.lng;
            header.dataset.regionId = prov.id;

            const toggle = document.createElement('span');
            toggle.className = 'tree-toggle';
            toggle.textContent = '▶';
            toggle.style.visibility = (prov.children && prov.children.length > 0) ? 'visible' : 'hidden';

            const label = document.createElement('span');
            label.className = 'tree-label';
            label.textContent = prov.name;

            const badge = document.createElement('span');
            badge.className = 'province-type-badge';
            const tMap = { municipality: '直辖市', autonomous_region: '自治区', sar: '特区', province: '省' };
            badge.textContent = tMap[prov.type] || '省';

            header.appendChild(toggle);
            header.appendChild(label);
            header.appendChild(badge);
            div.appendChild(header);

            if (prov.children && prov.children.length > 0) {
                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'tree-children';
                const filteredCities = q ? prov.children.filter(c => c.name.includes(q)) : prov.children;

                for (const city of filteredCities) {
                    const cityDiv = document.createElement('div');
                    cityDiv.className = 'tree-item city';

                    const cityHeader = document.createElement('div');
                    cityHeader.className = 'tree-item-header city-header';
                    cityHeader.dataset.lat = city.lat;
                    cityHeader.dataset.lng = city.lng;
                    cityHeader.dataset.regionId = city.id;

                    const cityLabel = document.createElement('span');
                    cityLabel.className = 'tree-label';
                    cityLabel.textContent = city.name;
                    cityHeader.appendChild(cityLabel);

                    if (city.emoji) {
                        const dot = document.createElement('span');
                        dot.className = 'data-dot active';
                        cityHeader.appendChild(dot);
                    }

                    cityDiv.appendChild(cityHeader);
                    childrenDiv.appendChild(cityDiv);
                }

                div.appendChild(childrenDiv);
                if (q) {
                    childrenDiv.classList.add('expanded');
                    toggle.classList.add('expanded');
                }
            }

            container.appendChild(div);
        }

        if (!hasResult) {
            container.innerHTML = '<div class="sidebar-no-result">未找到匹配的风物</div>';
        }
    }

    function highlightSidebarItem(name) {
        document.querySelectorAll('.tree-item-header.active').forEach(el => el.classList.remove('active'));
        if (!name) return;
        const all = document.querySelectorAll('.tree-item-header');
        for (const el of all) {
            const label = el.querySelector('.tree-label');
            if (label && label.textContent.trim() === name) {
                el.classList.add('active');
                const parent = el.closest('.tree-item.province');
                if (parent) {
                    const children = parent.querySelector('.tree-children');
                    const toggle = parent.querySelector('.tree-toggle');
                    if (children && !children.classList.contains('expanded')) {
                        children.classList.add('expanded');
                        toggle.classList.add('expanded');
                    }
                    const scroll = document.getElementById('sidebarScroll');
                    const rect = el.getBoundingClientRect();
                    const srect = scroll.getBoundingClientRect();
                    if (rect.top < srect.top || rect.bottom > srect.bottom) {
                        el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    }
                }
                break;
            }
        }
    }

    function selectRegion(data, lat, lng) {
        highlightSidebarItem(data ? data.name : '');
        const provName = findProvinceName(data);
        highlightProvinceBorders(provName);

        const targetDist = (data && data.level === 'city') ? 1.0 : 1.9;
        flyTo(lat, lng, 1200, targetDist);

        // Show region card
        showRegionCard(data);
    }

    /* ──────────────────────────────────────────────────────
       Sidebar Events
       ────────────────────────────────────────────────────── */
    document.getElementById('sidebarToggle').addEventListener('click', () => {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            sidebar.classList.add('mobile-open');
            document.getElementById('sidebarOverlay').classList.add('visible');
        } else {
            sidebar.classList.toggle('collapsed');
        }
    });

    document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('mobile-open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        } else {
            sidebar.classList.add('collapsed');
        }
    }

    // Search
    let searchTimer = null;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            buildSidebar(allRegions, e.target.value);
        }, 200);
    });

    // Tree click delegation
    sidebarScroll.addEventListener('click', (e) => {
        const header = e.target.closest('.tree-item-header');
        if (!header) return;

        const isProvince = header.classList.contains('province-header');
        const clickedToggle = e.target.closest('.tree-toggle');

        if (isProvince && clickedToggle) {
            e.stopPropagation();
            const provDiv = header.closest('.tree-item.province');
            const children = provDiv.querySelector('.tree-children');
            const toggle = provDiv.querySelector('.tree-toggle');
            if (children) {
                children.classList.toggle('expanded');
                toggle.classList.toggle('expanded');
            }
            return;
        }

        const lat = parseFloat(header.dataset.lat);
        const lng = parseFloat(header.dataset.lng);
        if (isNaN(lat) || isNaN(lng)) return;

        const regionId = parseInt(header.dataset.regionId);
        let regionData = null;

        function findInTree(arr) {
            for (const r of arr) {
                if (r.id === regionId) return r;
                if (r.children) {
                    const found = findInTree(r.children);
                    if (found) return found;
                }
            }
            return null;
        }
        regionData = findInTree(allRegions);

        if (window.innerWidth <= 768) closeSidebar();
        selectRegion(regionData || { name: header.querySelector('.tree-label')?.textContent || '' }, lat, lng);
    });

    /* ──────────────────────────────────────────────────────
       Resize
       ────────────────────────────────────────────────────── */
    function onResize() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    /* ──────────────────────────────────────────────────────
       Animation Loop
       ────────────────────────────────────────────────────── */
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Slow rotation of constellation lines
        const constellations = scene.children.filter(c => c.type === 'Group');
        // The last two groups are our constellation groups (added after star fields)
        // We'll just let them drift slowly

        // Fly animation
        if (flyState) {
            const elapsed = performance.now() - flyState.startTime;
            const p = Math.min(elapsed / flyState.duration, 1);
            const ease = p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;

            camera.position.lerpVectors(flyState.startCamPos, flyState.endCamPos, ease);
            camera.lookAt(0, 0, 0);

            if (p >= 1) {
                controls.enableDamping = true;
                controls.enableRotate = true;
                controls.target.set(0, 0, 0);
                controls.update();
                const cb = flyState.callback;
                flyState = null;
                if (cb) cb();
            }
        } else {
            controls.update();
        }

        // Pulse selected province borders — green
        if (selectedBorderMaterials) {
            const bp = 0.3 + 0.5 * Math.sin(t * 1.5);
            for (const mat of selectedBorderMaterials) {
                mat.opacity = bp;
                const mix = 0.5 + 0.3 * Math.sin(t * 1.5);
                mat.color.setHSL(0.3, 0.6, mix * 0.45);
            }
        }

        // Subtle atmosphere pulse
        atmosMat.uniforms = atmosMat.uniforms || {};

        // Pulse scenic markers with staggered phases
        for (let i = 0; i < scenicMarkers.length; i++) {
            const m = scenicMarkers[i];
            const phase = i * 0.3;
            const pulse = 0.6 + 0.4 * Math.sin(t * 0.8 + phase);
            m.ring.material.opacity = m.baseOpacity * pulse;
            const scale = 0.8 + 0.4 * Math.sin(t * 0.8 + phase);
            m.ring.scale.set(scale, scale, scale);
        }

        renderer.render(scene, camera);
    }

    /* ──────────────────────────────────────────────────────
       Init
       ────────────────────────────────────────────────────── */
    async function init() {
        try {
            const res = await fetch('/api/regions/tree');
            allRegions = await res.json();
        } catch (err) {
            console.error('❌ 加载数据失败:', err);
            document.getElementById('sidebarScroll').innerHTML =
                '<div class="sidebar-no-result">数据加载失败，请刷新</div>';
        }

        buildSidebar(allRegions);
        loadProvinceBorders();
        loadChinaBorder();

        // Complete loading
        loadingProgress = 100;
        loadingBar.style.width = '100%';
        clearInterval(loadInterval);

        const loading = document.getElementById('loading');
        setTimeout(() => {
            loading.classList.add('hidden');
            setTimeout(() => loading.style.display = 'none', 1200);
        }, 500);

        // Fly to China center after loading
        setTimeout(() => flyTo(34, 108, 1500, 2.8), 800);

        animate();
    }

    init();
