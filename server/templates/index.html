<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索世界 - 3D 旅游地球</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000a14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #fff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000a14;
            z-index: 100;
            transition: opacity 0.8s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 240, 255, 0.15);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 24px 32px;
            background: linear-gradient(180deg, rgba(0,10,20,0.8) 0%, transparent 100%);
            pointer-events: none;
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f1f5f9, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 13px;
            color: rgba(148,163,184,0.8);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Hint */
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 13px;
            color: rgba(148,163,184,0.6);
            letter-spacing: 1px;
            animation: pulse-hint 3s ease-in-out infinite;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes pulse-hint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ─── Right Sidebar ─────────────────────────────── */
        #sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 360px;
            height: 100vh;
            z-index: 15;
            background: rgba(0, 12, 25, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid rgba(0, 240, 255, 0.08);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: -20px 0 60px rgba(0,0,0,0.5);
        }
        #sidebar.collapsed {
            transform: translateX(360px);
        }

        .sidebar-header {
            padding: 20px 20px 12px;
            flex-shrink: 0;
        }
        .sidebar-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .sidebar-title {
            font-size: 16px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 1px;
        }
        .sidebar-close-btn {
            width: 32px; height: 32px;
            border: none;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            color: #64748b;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .sidebar-close-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #f1f5f9;
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .sidebar-search input::placeholder { color: #475569; }
        .sidebar-search input:focus {
            border-color: rgba(0,240,255,0.3);
        }

        .sidebar-divider {
            height: 1px;
            background: rgba(255,255,255,0.04);
            flex-shrink: 0;
        }

        /* Tree scroll area */
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 0;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 3px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.2); border-radius: 2px; }

        /* Tree items */
        .tree-item-header {
            display: flex;
            align-items: center;
            padding: 9px 16px;
            cursor: pointer;
            transition: background 0.2s ease;
            gap: 6px;
            position: relative;
        }
        .tree-item-header:hover {
            background: rgba(0, 240, 255, 0.04);
        }
        .tree-item-header.active {
            background: rgba(0, 240, 255, 0.08);
        }
        .tree-item-header.active .tree-label {
            color: #00f0ff;
        }
        .tree-item-header.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background: #00f0ff;
            border-radius: 2px 0 0 2px;
            box-shadow: 0 0 8px rgba(0,240,255,0.4);
        }

        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #475569;
            flex-shrink: 0;
            transition: transform 0.25s ease, color 0.25s ease;
        }
        .tree-toggle.expanded {
            transform: rotate(90deg);
            color: #00f0ff;
        }

        .tree-label {
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .province-type-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(0,240,255,0.06);
            color: rgba(0,240,255,0.5);
            border: 1px solid rgba(0,240,255,0.08);
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .tree-item.province > .tree-item-header {
            padding-left: 12px;
        }
        .tree-children {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease;
        }
        .tree-children.expanded {
            max-height: 2000px;
        }

        .city-header {
            padding-left: 46px;
        }
        .city-header .tree-label {
            font-size: 13px;
            font-weight: 400;
            color: #94a3b8;
        }
        .city-header:hover .tree-label {
            color: #cbd5e1;
        }
        .city-header.active .tree-label {
            color: #00f0ff;
        }

        .data-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0,240,255,0.15);
            flex-shrink: 0;
        }
        .data-dot.active {
            background: #00f0ff;
            box-shadow: 0 0 6px rgba(0,240,255,0.6);
        }

        .sidebar-no-result {
            padding: 40px 20px;
            text-align: center;
            color: #475569;
            font-size: 14px;
        }

        /* ─── Info area (bottom of sidebar) ─────────────── */
        /* Sidebar toggle button */
        #sidebarToggle {
            position: fixed;
            top: 20px;
            right: 16px;
            z-index: 20;
            width: 38px;
            height: 38px;
            border: 1px solid rgba(0,240,255,0.12);
            background: rgba(0,12,25,0.8);
            backdrop-filter: blur(12px);
            border-radius: 10px;
            color: #94a3b8;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            padding: 0;
        }
        #sidebarToggle:hover {
            border-color: rgba(0,240,255,0.3);
            color: #00f0ff;
        }
        #sidebarToggle svg {
            width: 20px;
            height: 20px;
        }

        /* Overlay for mobile */
        #sidebarOverlay {
            position: fixed;
            inset: 0;
            z-index: 14;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #sidebarOverlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ─── Responsive ────────────────────────────────── */
        @media (min-width: 769px) {
            #sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            #sidebar.collapsed ~ #sidebarToggle {
                display: flex;
            }
            #sidebar:not(.collapsed) ~ #sidebarToggle {
                display: none;
            }
            #sidebarOverlay { display: none; }
        }
        @media (max-width: 768px) {
            #sidebar {
                width: 320px;
                max-width: 85vw;
                transform: translateX(100%);
            }
            #sidebar.mobile-open { transform: translateX(0); }
            #sidebarToggle { display: flex; }
            #sidebar.collapsed ~ #sidebarToggle,
            #sidebar.mobile-open ~ #sidebarToggle { display: none; }
        }
        @media (max-width: 640px) {
            .header h1 { font-size: 18px; }
            .header p { font-size: 12px; }
            .hint { font-size: 11px; bottom: 24px; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>加载地球...</p>
</div>

<div id="canvas-container"></div>

<div class="header">
    <h1>✦ 探索世界</h1>
    <p>从右侧导航选择目的地</p>
</div>

<div class="hint">🖱 拖拽旋转 · 侧栏选择目的地</div>

<!-- Sidebar toggle -->
<button id="sidebarToggle" aria-label="展开导航">
    <svg viewBox="0 0 20 20" fill="none">
        <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
</button>

<!-- Sidebar overlay -->
<div id="sidebarOverlay"></div>

<!-- Right sidebar -->
<div id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-header-top">
            <h2 class="sidebar-title">🗺️ 中国行政区划</h2>
            <button id="sidebarClose" class="sidebar-close-btn" aria-label="收起导航">✕</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="搜索省份/城市..." />
        </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-scroll" id="sidebarScroll"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 0.8, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.5;
controls.autoRotate = false;
controls.minDistance = 1.8;
controls.maxDistance = 6;
controls.target.set(0, 0, 0);

// ─── Earth ──────────────────────────────────────────────
const EARTH_RADIUS = 1;
const earthGroup = new THREE.Group();
scene.add(earthGroup);

const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
const textureLoader = new THREE.TextureLoader();

const earthMat = new THREE.MeshStandardMaterial({
    roughness: 0.5,
    metalness: 0.1,
    color: 0x2233aa,
});

const earth = new THREE.Mesh(earthGeo, earthMat);
earthGroup.add(earth);

const texUrl = 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';
textureLoader.load(texUrl, (tex) => {
    earthMat.map = tex;
    earthMat.color.set(0xffffff);
    earthMat.needsUpdate = true;
}, undefined, () => {
    textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
        earthMat.map = tex;
        earthMat.color.set(0xffffff);
        earthMat.needsUpdate = true;
    });
});

// ─── Atmosphere ──────────────────────────────────────────
const atmosMat = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            vec3 viewDir = normalize(-vPosition);
            float rim = 1.0 - max(0.0, dot(viewDir, vNormal));
            float intensity = pow(rim, 3.0) * 0.6;
            gl_FragColor = vec4(0.3, 0.8, 1.0, intensity);
        }
    `,
    transparent: true,
    side: THREE.FrontSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});
const atmosMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 48, 48), atmosMat);
earthGroup.add(atmosMesh);

// ─── Stars ──────────────────────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starsCount = 6000;
const starPos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount; i++) {
    const r = 50 + Math.random() * 200;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = r * Math.cos(phi);
    starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));

const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8,
    sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false,
}));
scene.add(stars);

// ─── Lights ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x8899cc, 1.2));
const sunLight = new THREE.DirectionalLight(0xffffff, 0.6);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);
const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
fillLight.position.set(-5, 0, -5);
scene.add(fillLight);
const backLight = new THREE.DirectionalLight(0x4488ff, 0.4);
backLight.position.set(0, -3, 5);
scene.add(backLight);

// ─── Helpers ──────────────────────────────────────────────
function latLngToVec3(lat, lng, radius) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

// ─── Province Borders ─────────────────────────────────────
const borderGroup = new THREE.Group();
earthGroup.add(borderGroup);
const borderMaterials = [];
const borderMaterialMap = {}; // provName → [material, ...]
let selectedBorderMaterials = null;

async function loadProvinceBorders() {
    try {
        const res = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json');
        const geo = await res.json();
        const R = EARTH_RADIUS * 1.003;

        for (const feature of geo.features) {
            const provName = feature.properties.name;
            const coords = feature.geometry.coordinates;
            const polygons = feature.geometry.type === 'MultiPolygon' ? coords : [coords];
            const mats = [];

            for (const polygon of polygons) {
                const ring = polygon[0];
                if (!ring || ring.length < 3) continue;

                const pts = ring.map(([lng, lat]) => latLngToVec3(lat, lng, R));
                pts.push(pts[0].clone());

                const mat = new THREE.LineBasicMaterial({
                    color: 0x00ffff,
                    transparent: true,
                    opacity: 0.25,
                    depthWrite: false,
                });
                borderGroup.add(new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts), mat
                ));
                borderMaterials.push(mat);
                mats.push(mat);
            }
            borderMaterialMap[provName] = mats;
        }
        console.log(`✅ 加载省界: ${geo.features.length} 个省`);
    } catch (err) {
        console.warn('⚠️ 省界加载失败:', err);
    }
}

function highlightProvinceBorders(provinceName) {
    // Dim all borders
    for (const mat of borderMaterials) {
        mat.opacity = 0.08;
    }
    // Set selected for pulsing
    if (provinceName && borderMaterialMap[provinceName]) {
        selectedBorderMaterials = borderMaterialMap[provinceName];
    } else {
        selectedBorderMaterials = null;
    }
}

function findProvinceName(data) {
    if (!data) return null;
    if (data.level === 'province') return data.name;
    // City → find parent province
    for (const prov of allRegions) {
        if (prov.children && prov.children.some(c => c.id === data.id || c.name === data.name)) {
            return prov.name;
        }
    }
    return null;
}

// ─── China National Border ─────────────────────────────────
const chinaBorderGroup = new THREE.Group();
earthGroup.add(chinaBorderGroup);

async function loadChinaBorder() {
    try {
        const res = await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000.json');
        const geo = await res.json();
        const feature = geo.features[0];
        if (!feature) throw new Error('empty GeoJSON');
        const coords = feature.geometry.coordinates;
        const polygons = feature.geometry.type === 'MultiPolygon' ? coords : [coords];

        for (const polygon of polygons) {
            const ring = polygon[0];
            if (!ring || ring.length < 3) continue;

            // Thick layered border: outer glow, main line, inner glow
            const layers = [
                { radius: 1.008, color: 0x00ffff, opacity: 0.2 },
                { radius: 1.005, color: 0x00ffff, opacity: 0.5 },
                { radius: 1.003, color: 0x66ffff, opacity: 0.9 },
            ];
            for (const layer of layers) {
                const pts = ring.map(([lng, lat]) => latLngToVec3(lat, lng, layer.radius));
                pts.push(pts[0].clone());
                chinaBorderGroup.add(new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({
                        color: layer.color,
                        transparent: true,
                        opacity: layer.opacity,
                        depthWrite: false,
                    })
                ));
            }
        }
        console.log('✅ 加载中国国界线');
    } catch (err) {
        console.warn('⚠️ 国界线加载失败:', err);
    }
}

// ─── Fly To Animation ─────────────────────────────────────
let flyState = null;

function flyTo(lat, lng, duration = 1200, targetDist = 2.5, callback = null) {
    if (flyState) {
        flyState = null;
    }
    const endTarget = latLngToVec3(lat, lng, 1);
    const dist = Math.max(targetDist, 1.8);
    const endCamPos = endTarget.clone().normalize().multiplyScalar(dist);

    flyState = {
        startTime: performance.now(),
        duration,
        startCamPos: camera.position.clone(),
        endCamPos,
        callback,
    };
    controls.enableDamping = false;
    controls.enableRotate = false;
    controls.autoRotate = false;
}

// ─── Sidebar ──────────────────────────────────────────────

// ─── Sidebar ──────────────────────────────────────────────
let allRegions = [];

function buildSidebar(regions, filter = '') {
    const container = document.getElementById('sidebarScroll');
    container.innerHTML = '';

    const q = filter.trim().toLowerCase();
    let hasResult = false;

    for (const prov of regions) {
        if (q && !prov.name.includes(q) && !(prov.children || []).some(c => c.name.includes(q))) continue;
        hasResult = true;

        const div = document.createElement('div');
        div.className = 'tree-item province';

        // Header
        const header = document.createElement('div');
        header.className = 'tree-item-header province-header';
        header.dataset.lat = prov.lat;
        header.dataset.lng = prov.lng;
        header.dataset.regionId = prov.id;

        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle';
        toggle.textContent = '▶';
        toggle.style.visibility = (prov.children && prov.children.length > 0) ? 'visible' : 'hidden';

        const label = document.createElement('span');
        label.className = 'tree-label';
        label.textContent = prov.name;

        const badge = document.createElement('span');
        badge.className = 'province-type-badge';
        const tMap = { municipality: '直辖市', autonomous_region: '自治区', sar: '特别行政区', province: '省' };
        badge.textContent = tMap[prov.type] || '省';

        header.appendChild(toggle);
        header.appendChild(label);
        header.appendChild(badge);
        div.appendChild(header);

        // Children
        if (prov.children && prov.children.length > 0) {
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'tree-children';

            // Filter children if searching
            const filteredCities = q ? prov.children.filter(c => c.name.includes(q)) : prov.children;
            for (const city of filteredCities) {
                const cityDiv = document.createElement('div');
                cityDiv.className = 'tree-item city';

                const cityHeader = document.createElement('div');
                cityHeader.className = 'tree-item-header city-header';
                cityHeader.dataset.lat = city.lat;
                cityHeader.dataset.lng = city.lng;
                cityHeader.dataset.regionId = city.id;

                const cityLabel = document.createElement('span');
                cityLabel.className = 'tree-label';
                cityLabel.textContent = city.name;

                cityHeader.appendChild(cityLabel);

                if (city.emoji) {
                    const dot = document.createElement('span');
                    dot.className = 'data-dot active';
                    cityHeader.appendChild(dot);
                }

                cityDiv.appendChild(cityHeader);
                childrenDiv.appendChild(cityDiv);
            }

            div.appendChild(childrenDiv);

            // Auto-expand if searching
            if (q) {
                childrenDiv.classList.add('expanded');
                toggle.classList.add('expanded');
            }
        }

        container.appendChild(div);
    }

    if (!hasResult) {
        container.innerHTML = '<div class="sidebar-no-result">未找到匹配的地区</div>';
    }
}

function highlightSidebarItem(name) {
    document.querySelectorAll('.tree-item-header.active').forEach(el => el.classList.remove('active'));
    if (!name) return;
    const q = `[data-region-id]`;
    // Try matching by text content
    const all = document.querySelectorAll('.tree-item-header');
    for (const el of all) {
        const label = el.querySelector('.tree-label');
        if (label && label.textContent.trim() === name) {
            el.classList.add('active');
            // Expand parent province
            const parent = el.closest('.tree-item.province');
            if (parent) {
                const children = parent.querySelector('.tree-children');
                const toggle = parent.querySelector('.tree-toggle');
                if (children && !children.classList.contains('expanded')) {
                    children.classList.add('expanded');
                    toggle.classList.add('expanded');
                }
                // Scroll into view
                const scroll = document.getElementById('sidebarScroll');
                const rect = el.getBoundingClientRect();
                const srect = scroll.getBoundingClientRect();
                if (rect.top < srect.top || rect.bottom > srect.bottom) {
                    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }
            break;
        }
    }
}

function selectRegion(data, lat, lng) {
    highlightSidebarItem(data ? data.name : '');

    // Highlight province borders
    const provName = findProvinceName(data);
    highlightProvinceBorders(provName);

    const targetDist = (data && data.level === 'city') ? 1.0 : 1.9;
    flyTo(lat, lng, 1200, targetDist);
}

// ─── Sidebar Events ──────────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click', () => {
    const sidebar = document.getElementById('sidebar');
    if (window.innerWidth <= 768) {
        sidebar.classList.add('mobile-open');
        document.getElementById('sidebarOverlay').classList.add('visible');
    } else {
        sidebar.classList.toggle('collapsed');
    }
});
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (window.innerWidth <= 768) {
        sidebar.classList.remove('mobile-open');
        document.getElementById('sidebarOverlay').classList.remove('visible');
    } else {
        sidebar.classList.add('collapsed');
    }
}

// Search
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        buildSidebar(allRegions, e.target.value);
    }, 200);
});

// Tree click delegation
document.getElementById('sidebarScroll').addEventListener('click', (e) => {
    const header = e.target.closest('.tree-item-header');
    if (!header) return;

    const isProvince = header.classList.contains('province-header');
    const clickedToggle = e.target.closest('.tree-toggle');

    if (isProvince && clickedToggle) {
        e.stopPropagation();
        const provDiv = header.closest('.tree-item.province');
        const children = provDiv.querySelector('.tree-children');
        const toggle = provDiv.querySelector('.tree-toggle');
        if (children) {
            children.classList.toggle('expanded');
            toggle.classList.toggle('expanded');
        }
        return;
    }

    // Fly to location
    const lat = parseFloat(header.dataset.lat);
    const lng = parseFloat(header.dataset.lng);
    if (isNaN(lat) || isNaN(lng)) return;

    // Find region data
    const regionId = parseInt(header.dataset.regionId);
    let regionData = null;

    function findInTree(arr) {
        for (const r of arr) {
            if (r.id === regionId) return r;
            if (r.children) {
                const found = findInTree(r.children);
                if (found) return found;
            }
        }
        return null;
    }
    regionData = findInTree(allRegions);

    // Close sidebar on mobile after selection
    if (window.innerWidth <= 768) closeSidebar();

    selectRegion(regionData || { name: header.querySelector('.tree-label')?.textContent || '' }, lat, lng);
});

// ─── Resize ──────────────────────────────────────────────
function onResize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ─── Animation ──────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Fly animation — only move camera, keep controls.target at origin
    if (flyState) {
        const elapsed = performance.now() - flyState.startTime;
        const p = Math.min(elapsed / flyState.duration, 1);
        const ease = p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;

        camera.position.lerpVectors(flyState.startCamPos, flyState.endCamPos, ease);
        camera.lookAt(0, 0, 0);

        if (p >= 1) {
            controls.enableDamping = true;
            controls.enableRotate = true;
            // Sync controls internal state after fly
            controls.target.set(0, 0, 0);
            controls.update();
            const cb = flyState.callback;
            flyState = null;
            if (cb) cb();
        }
    } else {
        controls.update();
    }

    // Pulse selected province borders only
    if (selectedBorderMaterials) {
        const bp = 0.4 + 0.45 * Math.sin(t * 1.5);
        for (const mat of selectedBorderMaterials) {
            mat.opacity = bp;
        }
    }

    renderer.render(scene, camera);
}

// ─── Data Fetch & Init ──────────────────────────────────
async function init() {
    try {
        const res = await fetch('/api/regions/tree');
        allRegions = await res.json();
        console.log(`✅ 加载 ${allRegions.length} 个省级行政区`);
    } catch (err) {
        console.error('❌ 加载数据失败:', err);
        // Fallback: no markers, but sidebar shows error
        document.getElementById('sidebarScroll').innerHTML =
            '<div class="sidebar-no-result">数据加载失败，请刷新重试</div>';
    }

    buildSidebar(allRegions);
    loadProvinceBorders();
    loadChinaBorder();

    // Loading complete
    const loading = document.getElementById('loading');
    setTimeout(() => {
        loading.classList.add('hidden');
        setTimeout(() => loading.style.display = 'none', 800);
    }, 600);

    // Fly to China center after loading
    setTimeout(() => flyTo(34, 108, 1500, 2.8), 900);

    animate();
    console.log('🌍 探索世界已加载');
}

init();
</script>
