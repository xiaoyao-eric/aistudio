<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务人员工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 44px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: 2px;
        }

        .header p {
            color: #94a3b8;
            font-size: 15px;
            margin-top: 8px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.3), transparent);
            margin-bottom: 36px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 28px 24px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .card:active {
            transform: translateY(-1px);
        }

        .card .emoji {
            font-size: 40px;
            margin-bottom: 16px;
            display: block;
        }

        .card .name {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 6px;
        }

        .card .desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">🧾</span>
            <h1>财务人员工作台</h1>
            <p>常用官方网站 · 点击即达</p>
        </div>

        <div class="divider"></div>

        <div class="grid">
            <a class="card" href="https://www.chinatax.gov.cn" target="_blank" rel="noopener noreferrer">
                <span class="emoji">🏛️</span>
                <span class="name">国家税务总局</span>
                <span class="desc">税收政策 · 纳税服务 · 官方门户</span>
            </a>

            <a class="card" href="https://www.12366.cn" target="_blank" rel="noopener noreferrer">
                <span class="emoji">📞</span>
                <span class="name">12366 纳税服务平台</span>
                <span class="desc">纳税咨询 · 办税指南 · 热线服务</span>
            </a>

            <a class="card" href="https://ausm.mof.gov.cn" target="_blank" rel="noopener noreferrer">
                <span class="emoji">📚</span>
                <span class="name">全国会计人员统一服务管理平台</span>
                <span class="desc">会计继续教育 · 资格管理 · 信息采集</span>
            </a>
        </div>

        <div class="footer">
            财务人员工作台 v1.0 · 所有链接均跳转至官方网站
        </div>
    </div>
</body>
</html>
