<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索世界 - 3D 旅游地球</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000a14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: #fff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000a14;
            z-index: 100;
            transition: opacity 0.8s ease;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loading .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 240, 255, 0.15);
            border-top-color: #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 24px 32px;
            background: linear-gradient(180deg, rgba(0,10,20,0.8) 0%, transparent 100%);
            pointer-events: none;
            text-align: center;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f1f5f9, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 13px;
            color: rgba(148,163,184,0.8);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Hint */
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 13px;
            color: rgba(148,163,184,0.6);
            letter-spacing: 1px;
            animation: pulse-hint 3s ease-in-out infinite;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes pulse-hint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Tooltip */
        #tooltip {
            position: fixed;
            z-index: 20;
            padding: 8px 16px;
            background: rgba(0,20,40,0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #tooltip.visible { opacity: 1; }
        #tooltip .tooltip-sub {
            font-size: 11px;
            font-weight: 400;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* Info Panel */
        #infoPanel {
            position: fixed;
            top: 0;
            right: -480px;
            width: 440px;
            max-width: 90vw;
            height: 100vh;
            z-index: 30;
            background: rgba(0, 15, 30, 0.92);
            backdrop-filter: blur(24px);
            border-left: 1px solid rgba(0,240,255,0.1);
            padding: 40px 32px;
            overflow-y: auto;
            transition: right 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: -20px 0 60px rgba(0,0,0,0.6);
        }
        #infoPanel.open { right: 0; }
        #infoPanel::-webkit-scrollbar { width: 4px; }
        #infoPanel::-webkit-scrollbar-track { background: transparent; }
        #infoPanel::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.3); border-radius: 2px; }

        .panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .panel-close:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
            transform: rotate(90deg);
        }

        .panel-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0,240,255,0.12);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 20px;
            font-size: 11px;
            color: #00f0ff;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .panel-title {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .panel-desc {
            font-size: 15px;
            line-height: 1.7;
            color: #cbd5e1;
            margin-bottom: 28px;
        }
        .panel-section {
            margin-bottom: 24px;
        }
        .panel-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #00f0ff;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-section ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .panel-section ul li {
            padding: 8px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            font-size: 14px;
            color: #e2e8f0;
            transition: all 0.2s ease;
        }
        .panel-section ul li:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0,240,255,0.2);
        }
        .panel-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 28px;
        }
        .panel-gallery .gallery-item {
            aspect-ratio: 16/10;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0,240,255,0.06), rgba(0,100,200,0.06));
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: rgba(255,255,255,0.3);
            overflow: hidden;
        }
        .panel-gallery .gallery-item span {
            font-size: 13px;
            color: #64748b;
        }

        /* Mobile */
        @media (max-width: 640px) {
            #infoPanel {
                width: 100vw;
                max-width: 100vw;
                right: -100vw;
                padding: 32px 24px;
            }
            #infoPanel.open { right: 0; }
            .header h1 { font-size: 18px; }
            .header p { font-size: 12px; }
            .panel-title { font-size: 22px; }
            .hint { font-size: 11px; bottom: 24px; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>加载地球...</p>
</div>

<div id="canvas-container"></div>

<div class="header">
    <h1>✦ 探索世界</h1>
    <p>点击光点，发现精彩目的地</p>
</div>

<div class="hint">🖱 拖拽旋转 · 点击光点探索</div>

<div id="tooltip">
    <div class="tooltip-name" id="tooltipName"></div>
    <div class="tooltip-sub" id="tooltipSub"></div>
</div>

<div id="infoPanel">
    <button class="panel-close" id="panelClose">✕</button>
    <div class="panel-badge" id="panelBadge">目的地</div>
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <div class="panel-gallery" id="panelGallery"></div>
    <div class="panel-section">
        <h3>📍 热门景点</h3>

    </div>
    <div class="panel-section">

</div>

        attractions: ['悉尼歌剧院', '悉尼海港大桥', '邦迪海滩', '蓝山', '达令港', '塔龙加动物园'],

// ─── Scene Setup ───────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 0.8, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.5;
controls.autoRotate = false;
controls.minDistance = 1.8;
controls.maxDistance = 6;
controls.target.set(0, 0, 0);

// ─── Earth ──────────────────────────────────────────────
const EARTH_RADIUS = 1;
const earthGroup = new THREE.Group();
scene.add(earthGroup);

const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
const textureLoader = new THREE.TextureLoader();

const earthMat = new THREE.MeshStandardMaterial({
    roughness: 0.5,
    metalness: 0.1,
    color: 0x2233aa,
});

const earth = new THREE.Mesh(earthGeo, earthMat);
earthGroup.add(earth);

// Load texture
const texUrl = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
textureLoader.load(texUrl, (tex) => {
    earthMat.map = tex;
    earthMat.color.set(0xffffff);
    earthMat.needsUpdate = true;
}, undefined, () => {
    // Fallback: try another source
    textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', (tex) => {
        earthMat.map = tex;
        earthMat.color.set(0xffffff);
        earthMat.needsUpdate = true;
    });
});

// ─── Atmosphere ──────────────────────────────────────────
const atmosMat = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            vec3 viewDir = normalize(-vPosition);
            float rim = 1.0 - max(0.0, dot(viewDir, vNormal));
            float intensity = pow(rim, 3.0) * 0.6;
            gl_FragColor = vec4(0.3, 0.8, 1.0, intensity);
        }
    `,
    transparent: true,
    side: THREE.FrontSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});
const atmosMesh = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 48, 48), atmosMat);
earthGroup.add(atmosMesh);

// ─── Stars ──────────────────────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starsCount = 6000;
const starPos = new Float32Array(starsCount * 3);
const starSizes = new Float32Array(starsCount);
for (let i = 0; i < starsCount; i++) {
    const r = 50 + Math.random() * 200;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i * 3 + 1] = r * Math.cos(phi);
    starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    starSizes[i] = 0.5 + Math.random() * 1.5;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starsGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

const starMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.15,
    transparent: true,
    opacity: 0.8,
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});
const stars = new THREE.Points(starsGeo, starMat);
scene.add(stars);

// ─── Lights ──────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.5);
fillLight.position.set(-3, -1, -3);
scene.add(fillLight);

// ─── Markers ────────────────────────────────────────────
const markers = [];
const markerGroup = new THREE.Group();
earthGroup.add(markerGroup);

function latLngToVec3(lat, lng, radius) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;
    return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

function createGlowTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.1, 'rgba(0,240,255,0.9)');
    gradient.addColorStop(0.4, 'rgba(0,240,255,0.3)');
    gradient.addColorStop(1, 'rgba(0,240,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(canvas);
}

const glowTex = createGlowTexture();
const glowMat = new THREE.SpriteMaterial({
    map: glowTex,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    opacity: 0.9,
});

const markerMeshes = [];

LOCATIONS.forEach((loc) => {
    const pos = latLngToVec3(loc.lat, loc.lng, EARTH_RADIUS);

    // Core dot
    const dotGeo = new THREE.SphereGeometry(0.018, 12, 12);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.copy(pos);
    markerGroup.add(dot);

    // Glow sprite
    const glow = new THREE.Sprite(glowMat.clone());
    glow.position.copy(pos);
    glow.scale.set(0.18, 0.18, 1);
    glow.userData.baseScale = 0.18;
    markerGroup.add(glow);

    // Light pillar
    const pillarPos = pos.clone().normalize().multiplyScalar(EARTH_RADIUS + 0.01);
    const pillarEnd = pos.clone().normalize().multiplyScalar(EARTH_RADIUS + 0.06);
    const pillarGeo = new THREE.BufferGeometry().setFromPoints([
        pillarPos, pillarEnd
    ]);
    const pillarMat = new THREE.LineBasicMaterial({
        color: 0x00f0ff,
        transparent: true,
        opacity: 0.3,
    });
    const pillar = new THREE.Line(pillarGeo, pillarMat);
    markerGroup.add(pillar);

    // Ring (pulsing)
    const ringGeo = new THREE.RingGeometry(0.025, 0.04, 24);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x00f0ff,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide,
        depthWrite: false,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.lookAt(new THREE.Vector3(0, 0, 0));
    markerGroup.add(ring);

    const markerData = {
        data: loc,
        position: pos.clone(),
        dot,
        glow,
        pillar,
        ring,
        ringMat,
        animPhase: Math.random() * Math.PI * 2,
    };
    markers.push(markerData);
    markerMeshes.push(dot);
});

// ─── Raycaster ──────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hoveredMarker = null;
let selectedMarker = null;
let isPointerDown = false;
let pointerMoved = false;
let pointerDownPos = { x: 0, y: 0 };

function getMarkerIntersects(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const intersects = raycaster.intersectObjects(markerMeshes);
    if (intersects.length > 0) {
        const hit = intersects[0].object;
        return markers.find(m => m.dot === hit) || null;
    }
    return null;
}

function onPointerDown(event) {
    isPointerDown = true;
    pointerMoved = false;
    pointerDownPos.x = event.clientX;
    pointerDownPos.y = event.clientY;
}

function onPointerMove(event) {
    if (isPointerDown) {
        const dx = event.clientX - pointerDownPos.x;
        const dy = event.clientY - pointerDownPos.y;
        if (Math.sqrt(dx * dx + dy * dy) > 5) {
            pointerMoved = true;
        }
    }

    const hit = getMarkerIntersects(event);
    const tooltip = document.getElementById('tooltip');
    const tooltipName = document.getElementById('tooltipName');
    const tooltipSub = document.getElementById('tooltipSub');

    if (hit && selectedMarker !== hit) {
        document.body.style.cursor = 'pointer';
        tooltipName.textContent = hit.data.emoji + ' ' + hit.data.name;
        tooltipSub.textContent = hit.data.badge.replace('📍 ', '');
        tooltip.style.left = (event.clientX + 16) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';
        tooltip.classList.add('visible');

        if (hoveredMarker && hoveredMarker !== hit) {
            resetMarkerStyle(hoveredMarker);
        }
        hoveredMarker = hit;
        highlightMarker(hit);
    } else {
        document.body.style.cursor = 'default';
        tooltip.classList.remove('visible');
        if (hoveredMarker && hoveredMarker !== selectedMarker) {
            resetMarkerStyle(hoveredMarker);
        }
        hoveredMarker = null;
    }
}

function onPointerUp(event) {
    if (!pointerMoved) {
        const hit = getMarkerIntersects(event);
        if (hit) {
            selectLocation(hit);
        } else if (selectedMarker) {
            closePanel();
        }
    }
    isPointerDown = false;
}

function highlightMarker(marker) {
    marker.glow.material.opacity = 1;
    marker.glow.scale.set(0.3, 0.3, 1);
    marker.dot.material.color.setHex(0xffffff);
    marker.pillar.material.opacity = 0.8;
}

function resetMarkerStyle(marker) {
    marker.glow.material.opacity = 0.9;
    marker.glow.scale.set(marker.glow.userData.baseScale || 0.18, marker.glow.userData.baseScale || 0.18, 1);
    marker.dot.material.color.setHex(0x00f0ff);
    marker.pillar.material.opacity = 0.3;
}

// ─── Events ──────────────────────────────────────────────
renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);
renderer.domElement.addEventListener('pointerleave', () => {
    document.getElementById('tooltip').classList.remove('visible');
    if (hoveredMarker && hoveredMarker !== selectedMarker) {
        resetMarkerStyle(hoveredMarker);
    }
    hoveredMarker = null;
    isPointerDown = false;
});

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        const touch = e.touches[0];
        onPointerDown({ clientX: touch.clientX, clientY: touch.clientY });
    }
}, { passive: true });

renderer.domElement.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) {
        const touch = e.touches[0];
        pointerMoved = true;
    }
}, { passive: true });

renderer.domElement.addEventListener('touchend', (e) => {
    if (!pointerMoved) {
        const touch = e.changedTouches[0];
        onPointerUp({ clientX: touch.clientX, clientY: touch.clientY });
    }
    isPointerDown = false;
}, { passive: true });

// ─── Panel ──────────────────────────────────────────────
function selectLocation(marker) {
    const loc = marker.data;

    // Reset previous selection
    if (selectedMarker && selectedMarker !== marker) {
        resetMarkerStyle(selectedMarker);
    }
    selectedMarker = marker;
    highlightMarker(marker);

    // Populate panel
    document.getElementById('panelBadge').textContent = loc.badge;
    document.getElementById('panelTitle').textContent = loc.emoji + ' ' + loc.name;
    document.getElementById('panelDesc').textContent = loc.desc;

    const gallery = document.getElementById('panelGallery');
    gallery.innerHTML = '';
    loc.attractions.slice(0, 4).forEach((attr, i) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        const icons = ['🏯', '🏔️', '🌊', '🌺', '🏛️', '🎋', '🏝️', '🏰'];
        div.innerHTML = `<span>${icons[i % icons.length]} ${attr}</span>`;
        gallery.appendChild(div);
    });

    const attractionsList = document.getElementById('panelAttractions');
    attractionsList.innerHTML = '';
    loc.attractions.forEach(a => {
        const li = document.createElement('li');
        li.textContent = a;
        attractionsList.appendChild(li);
    });

    const foodList = document.getElementById('panelFood');
    foodList.innerHTML = '';
    loc.food.forEach(f => {
        const li = document.createElement('li');
        li.textContent = f;
        foodList.appendChild(li);
    });

    document.getElementById('infoPanel').classList.add('open');
    controls.autoRotate = false;
    document.getElementById('tooltip').classList.remove('visible');
}

function closePanel() {
    if (selectedMarker) {
        resetMarkerStyle(selectedMarker);
        selectedMarker = null;
    }
    document.getElementById('infoPanel').classList.remove('open');
}

document.getElementById('panelClose').addEventListener('click', closePanel);

// Close panel on Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePanel();
});

// ─── Resize ──────────────────────────────────────────────
function onResize() {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ─── Animation ──────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Animate markers
    markers.forEach((m, i) => {
        const phase = m.animPhase + t * 1.5;
        // Pulse glow
        const pulse = 1 + 0.15 * Math.sin(phase);
        m.glow.scale.set(
            m.glow.userData.baseScale * pulse,
            m.glow.userData.baseScale * pulse,
            1
        );
        // Pulse ring
        const ringScale = 1 + 0.6 * Math.sin(phase);
        m.ring.scale.set(ringScale, ringScale, 1);
        m.ringMat.opacity = 0.5 * (1 - 0.5 * Math.sin(phase));
    });

    controls.update();
    renderer.render(scene, camera);
}

// ─── Start ──────────────────────────────────────────────
const loading = document.getElementById('loading');
// Show for at least 0.8s for smooth transition
setTimeout(() => {
    loading.classList.add('hidden');
    setTimeout(() => loading.style.display = 'none', 800);
}, 600);

animate();

console.log('🌍 探索世界已加载 · 点击光点探索目的地');
</script>
