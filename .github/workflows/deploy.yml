name: Deploy to Tencent Cloud

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /aistudio
            git pull origin master
            # 重启Flask应用
            supervisorctl restart aistudio 2>/dev/null || pkill -f "python run.py" && cd /aistudio && nohup python run.py > /dev/null 2>&1 &
