name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /aistudio
            curl -sO https://raw.githubusercontent.com/xiaoyao-eric/aistudio/master/docker-compose.yml
            docker compose pull
            docker compose down
            docker compose up -d

      - name: Notify Feishu
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK }}
          STATUS: ${{ job.status }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"msg_type":"interactive","card":{"header":{"title":{"tag":"plain_text","content":"🚀 AI Studio 部署通知"},"template":"'$([ "$STATUS" = "success" ] && echo "green" || echo "red")'"},"elements":[{"tag":"markdown","content":"**状态：** '"$([ "$STATUS" = "success" ] && echo "✅ 部署成功" || echo "❌ 部署失败")"'\n**Commit：** `${{ github.sha }}`\n**分支：** `${{ github.ref_name }}`\n**触发人：** ${{ github.actor }}"}]}}'
